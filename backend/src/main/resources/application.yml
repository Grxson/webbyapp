server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/scraper
    username: scraper
    password: scraper123
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-authentication}
  expiration: ${JWT_EXPIRATION:86400000}

scraper:
  default-timeout-ms: 30000
  default-rate-limit-ms: 2000

resilience4j:
  circuitbreaker:
    instances:
      scraping:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html